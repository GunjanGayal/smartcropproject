<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prediction Result</title>
</head>
<body>
<h1>🌿<b> Prediction Result</b></h1>
<img src="{{ url_for('static', filename='uploads/' + image_file) }}" alt="Uploaded Image" width="300">
<h2>Crop: {{ crop }}</h2>
<h2>Disease: {{ disease }}</h2>
<h3>Confidence: {{ confidence }}%</h3>
<p><strong>Prevention:</strong> {{ prevention }}</p>
<p><strong>Treatment:</strong> {{ treatment }}</p>
<a href="/upload">Upload Another Image</a>
</body>
</html>
